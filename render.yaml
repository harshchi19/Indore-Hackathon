# ── Render Blueprint ── https://render.com/docs/blueprint-spec
# Deploy this file to auto-configure the backend service on Render.

services:
  - type: web
    name: verdant-backend
    runtime: python
    region: oregon  # Change to your preferred region
    plan: free      # free | starter | standard | pro

    # ── Python Version ────────────────────────────────────
    pythonVersion: "3.11.7"

    # ── Build ─────────────────────────────────────────────
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt

    # ── Start ─────────────────────────────────────────────
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # ── Health Check ──────────────────────────────────────
    healthCheckPath: /health

    # ── Environment Variables ─────────────────────────────
    envVars:
      - key: ENVIRONMENT
        value: staging

      - key: DEBUG
        value: "false"

      - key: LOG_LEVEL
        value: WARNING

      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard (secret)

      - key: MONGODB_DB_NAME
        value: verdant

      - key: JWT_SECRET_KEY
        generateValue: true  # Render auto-generates a secure random string

      - key: ALLOWED_ORIGINS
        value: "*"  # Change to your Vercel URL after deploy, e.g. https://your-app.vercel.app

      - key: REDIS_URL
        sync: false  # Optional – set if using Render Redis add-on

      - key: RATE_LIMIT_PER_MINUTE
        value: "120"

      - key: PRICING_UPDATE_INTERVAL_SECONDS
        value: "10"

      - key: BASE_ENERGY_PRICE_KWH
        value: "0.12"

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"

      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      # ── AI Services ──────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false  # Set in Render dashboard (secret)

      - key: GEMINI_API_KEY
        sync: false  # Set in Render dashboard (secret)

      - key: SARVAM_API_KEY
        sync: false  # Set in Render dashboard (secret)

      # ── Neo4j ─────────────────────────────────────────────
      - key: ENABLE_NEO4J
        value: "false"  # Change to "true" after configuring Neo4j Aura

      - key: NEO4J_URI
        sync: false  # Set in Render dashboard (secret)

      - key: NEO4J_USERNAME
        sync: false

      - key: NEO4J_PASSWORD
        sync: false
