# ── Render Blueprint ── https://render.com/docs/blueprint-spec
# Deploy this file to auto-configure the backend service on Render.

services:
  - type: web
    name: verdant-backend
    runtime: python
    region: oregon  # Change to your preferred region
    plan: free      # free | starter | standard | pro

    # ── Build ─────────────────────────────────────────────
    rootDir: backend
    buildCommand: pip install -r requirements.txt

    # ── Start ─────────────────────────────────────────────
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # ── Health Check ──────────────────────────────────────
    healthCheckPath: /health

    # ── Environment Variables ─────────────────────────────
    envVars:
      - key: ENVIRONMENT
        value: production

      - key: DEBUG
        value: "false"

      - key: LOG_LEVEL
        value: WARNING

      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard (secret)

      - key: MONGODB_DB_NAME
        value: verdant

      - key: JWT_SECRET_KEY
        generateValue: true  # Render auto-generates a secure random string

      - key: ALLOWED_ORIGINS
        sync: false  # Set to your Vercel frontend URL, e.g. ["https://your-app.vercel.app"]

      - key: REDIS_URL
        sync: false  # Optional – set if using Render Redis add-on

      - key: RATE_LIMIT_PER_MINUTE
        value: "120"

      - key: PRICING_UPDATE_INTERVAL_SECONDS
        value: "10"

      - key: BASE_ENERGY_PRICE_KWH
        value: "0.12"

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"

      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      - key: PYTHON_VERSION
        value: "3.11.7"
